name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: crm_test
          MYSQL_ROOT_PASSWORD: root
          MYSQL_USER: crm
          MYSQL_PASSWORD: crm
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u crm -pcrm"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Ruff check
        run: ruff check .
        working-directory: backend

      - name: Mypy
        run: mypy apps/
        working-directory: backend

      - name: Pytest
        env:
          DATABASE_URL: mysql://crm:crm@127.0.0.1:3306/crm_test
          SECRET_KEY: ci-secret-key-not-for-production
          DEBUG: 'true'
          DJANGO_SETTINGS_MODULE: crm.settings.dev
        run: pytest
        working-directory: backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: TypeScript check
        run: npm run typecheck
        working-directory: frontend

      - name: Vitest coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Prettier check
        run: npm run format:check
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
